<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do Dashboard Columns</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
 
      <div class="left-column">
        <div class="form-section">
          <h1>Add New Task</h1>
          <form id="todoForm">
            <div class="title">
              <label for="">Task Title*</label>
              <input type="text" id="title" placeholder="Task Title" required />
            </div>
            <div class="text-explain">
              <label for="">Description</label>
              <textarea
                id="description"
                placeholder="Task Description"
                required
              ></textarea>
            </div>
            <div class="date-priority">
              <div class="important-level">
                <label for="">Priority</label>
                <select id="priority" required>
                  <option value="">Select Priority</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div class="due-date">
                <label for="">Due Date</label>
                <input type="date" id="dueDate" required />
              </div>
            </div>

            <button type="submit" id="add-btn">Add Task</button>
          </form>
        </div>

        <div class="tasks">
          <ul id="taskList">
            <li class="task-card">

              <input type="checkbox" class="task-check" data-index="0"/>


              <div class="task-content">
                <h2 class="card-title">Task Title</h2>
                <p class="card-desc">Task description goes here</p>

                <div class="card-level">
                  <span class="priority high">High</span>
                  <span class="date">2026-03-01</span>
                </div>
              </div>

              <button class="delete-btn" type="button">🗑</button>
            </li>
          </ul>
        </div>
      </div>

      <div class="right-column">
        <div class="progress-card">
          <h3>Progress</h3>
          <div class="complete-rate">
            <p>Completion Rate</p>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card" id="totalTasks">
            <span class="icon total">&#128221; </span>
            <span class="stats-text">Total Tasks</span>
            <h2 class="stats-num">1</h2>
          </div>

          <div class="stat-card" id="completedTasks">
            <span class="icon completed">&#10003;</span>
            <span class="stats-text">Completed</span>
            <h2 class="stats-num">1</h2>
          </div>

          <div class="stat-card" id="pendingTasks">
            <span class="icon pending">&#9200;</span>
            <span class="stats-text">Pending</span>
            <h2 class="stats-num">1</h2>
          </div>

          <div class="stat-card" id="highPriorityTasks">
            <span class="icon high">&#9888;</span>
            <span class="stats-text">High Priority</span>
            <h2 class="stats-num">1</h2>
          </div>
        </div>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
